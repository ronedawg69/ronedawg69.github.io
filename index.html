<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#27194c">
  <title>8-Bit Sunset</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

    :root {
      --pixel: clamp(4px, 0.55vw, 8px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #100d2b;
      color: white;
      font-family: "Press Start 2P", monospace;
    }

    .world {
      position: relative;
      isolation: isolate;
      width: 100vw;
      height: 100vh;
      min-height: 35rem;
      overflow: hidden;
      background:
        linear-gradient(
          to bottom,
          #20174f 0%,
          #49326f 26%,
          #a04c78 51%,
          #ef795f 72%,
          #ffc36b 100%
        );
      animation: darken-sky 20s steps(10) infinite alternate;
    }

    /* Pixel-grid texture */
    .world::after {
      position: absolute;
      z-index: 50;
      inset: 0;
      background-image:
        linear-gradient(rgb(255 255 255 / 2%) 1px, transparent 1px),
        linear-gradient(90deg, rgb(255 255 255 / 2%) 1px, transparent 1px);
      background-size: var(--pixel) var(--pixel);
      pointer-events: none;
      content: "";
    }

    /* Stars generated by JavaScript */
    .stars {
      position: absolute;
      z-index: -1;
      inset: 0 0 30%;
      overflow: hidden;
    }

    .star {
      --delay: 0s;
      --duration: 3s;
      --size: 4px;

      position: absolute;
      width: var(--size);
      height: var(--size);
      background: #fff8c8;
      box-shadow:
        var(--size) 0 #fff8c8,
        calc(var(--size) * -1) 0 #fff8c8,
        0 var(--size) #fff8c8,
        0 calc(var(--size) * -1) #fff8c8;
      opacity: 0;
      animation:
        star-appear 20s steps(5) var(--delay) infinite alternate,
        twinkle var(--duration) steps(2) var(--delay) infinite;
    }

    .star.small {
      box-shadow: none;
    }

    /* The setting sun */
    .sun {
      position: absolute;
      z-index: -2;
      bottom: 23%;
      left: 50%;
      width: clamp(7rem, 16vw, 13rem);
      aspect-ratio: 1;
      background:
        linear-gradient(
          to bottom,
          #fff2a6 0 18%,
          #ffd56a 18% 42%,
          #ffad52 42% 68%,
          #ff784f 68%
        );
      box-shadow:
        0 0 0 var(--pixel) rgb(255 203 92 / 18%),
        0 0 0 calc(var(--pixel) * 3) rgb(255 155 76 / 10%);
      clip-path: polygon(
        25% 0, 75% 0,
        75% 6.25%, 87.5% 6.25%,
        87.5% 12.5%, 93.75% 12.5%,
        93.75% 25%, 100% 25%,
        100% 75%, 93.75% 75%,
        93.75% 87.5%, 87.5% 87.5%,
        87.5% 93.75%, 75% 93.75%,
        75% 100%, 25% 100%,
        25% 93.75%, 12.5% 93.75%,
        12.5% 87.5%, 6.25% 87.5%,
        6.25% 75%, 0 75%,
        0 25%, 6.25% 25%,
        6.25% 12.5%, 12.5% 12.5%,
        12.5% 6.25%, 25% 6.25%
      );
      transform: translateX(-50%);
      animation: sunset 20s steps(10) infinite alternate;
    }

    /* Pixel clouds */
    .cloud {
      position: absolute;
      z-index: 1;
      width: 9rem;
      height: 1.1rem;
      background: #68416d;
      box-shadow:
        1.2rem -1.1rem #68416d,
        2.3rem -1.1rem #68416d,
        3.4rem -2.2rem #68416d,
        4.5rem -2.2rem #68416d,
        5.6rem -1.1rem #68416d,
        6.8rem -1.1rem #68416d,
        1.2rem 1.1rem #8d506f,
        2.3rem 1.1rem #8d506f,
        3.4rem 1.1rem #8d506f,
        4.5rem 1.1rem #8d506f,
        5.6rem 1.1rem #8d506f;
      opacity: 0.65;
    }

    .cloud.one {
      top: 28%;
      left: -14rem;
      animation: cloud-drift 29s linear infinite;
    }

    .cloud.two {
      top: 43%;
      left: -20rem;
      scale: 0.65;
      animation: cloud-drift 38s linear 8s infinite;
    }

    /* Main message */
    .welcome {
      position: absolute;
      z-index: 20;
      top: 38%;
      left: 50%;
      width: min(90%, 60rem);
      text-align: center;
      transform: translate(-50%, -50%);
      animation: welcome-in 1.2s steps(7) both;
    }

    .welcome h1 {
      margin: 0;
      color: #fff7cf;
      font-size: clamp(2.5rem, 9vw, 7rem);
      line-height: 1.15;
      letter-spacing: 0.04em;
      text-shadow:
        var(--pixel) var(--pixel) 0 #c4476d,
        calc(var(--pixel) * 2) calc(var(--pixel) * 2) 0 #55285f;
    }

    .welcome p {
      margin: 2rem 0 0;
      color: #fff4be;
      font-size: clamp(0.55rem, 1.3vw, 0.85rem);
      line-height: 2;
      text-shadow: 3px 3px 0 #5b2d61;
    }

    .blink {
      display: inline-block;
      width: 0.75em;
      height: 1em;
      margin-left: 0.35em;
      background: currentColor;
      vertical-align: -0.15em;
      animation: blink 1s steps(1) infinite;
    }

    /* Distant mountains */
    .mountains {
      position: absolute;
      z-index: 5;
      right: 0;
      bottom: 20%;
      left: 0;
      height: 26%;
      background: #312451;
      clip-path: polygon(
        0 100%, 0 70%,
        7% 70%, 7% 60%,
        13% 60%, 13% 48%,
        19% 48%, 19% 35%,
        24% 35%, 24% 45%,
        30% 45%, 30% 62%,
        36% 62%, 36% 74%,
        43% 74%, 43% 65%,
        49% 65%, 49% 52%,
        55% 52%, 55% 38%,
        61% 38%, 61% 22%,
        67% 22%, 67% 37%,
        72% 37%, 72% 49%,
        78% 49%, 78% 61%,
        84% 61%, 84% 52%,
        90% 52%, 90% 68%,
        96% 68%, 96% 77%,
        100% 77%, 100% 100%
      );
    }

    .mountains::after {
      position: absolute;
      inset: 25% 0 0;
      background: #20183f;
      clip-path: polygon(
        0 100%, 0 72%,
        14% 72%, 14% 56%,
        24% 56%, 24% 70%,
        39% 70%, 39% 48%,
        50% 48%, 50% 74%,
        67% 74%, 67% 46%,
        76% 46%, 76% 61%,
        87% 61%, 87% 54%,
        100% 54%, 100% 100%
      );
      content: "";
    }

    /* Ocean */
    .ocean {
      position: absolute;
      z-index: 10;
      right: 0;
      bottom: 0;
      left: 0;
      height: 22%;
      overflow: hidden;
      background:
        repeating-linear-gradient(
          to bottom,
          #302655 0 8px,
          #272047 8px 16px,
          #1b1938 16px 24px
        );
      border-top: var(--pixel) solid #49345f;
    }

    .reflection {
      position: absolute;
      top: 0;
      left: 50%;
      width: clamp(5rem, 17vw, 12rem);
      height: 100%;
      background:
        repeating-linear-gradient(
          to bottom,
          #ffc45f 0 5px,
          transparent 5px 11px
        );
      clip-path: polygon(
        38% 0, 62% 0,
        72% 18%, 58% 28%,
        80% 43%, 65% 55%,
        91% 70%, 76% 80%,
        100% 100%, 0 100%,
        25% 80%, 9% 69%,
        37% 53%, 20% 40%,
        43% 26%, 30% 15%
      );
      opacity: 0.58;
      transform: translateX(-50%);
      animation: shimmer 1.5s steps(3) infinite alternate;
    }

    .wave {
      position: absolute;
      left: -10%;
      width: 120%;
      height: 5px;
      background: repeating-linear-gradient(
        to right,
        transparent 0 2rem,
        #655184 2rem 5rem,
        transparent 5rem 8rem
      );
      animation: wave 3s steps(5) infinite alternate;
    }

    .wave:nth-child(2) { top: 22%; animation-delay: -0.5s; }
    .wave:nth-child(3) { top: 48%; animation-delay: -1s; }
    .wave:nth-child(4) { top: 74%; animation-delay: -1.5s; }

    /* Foreground shoreline */
    .shore {
      position: absolute;
      z-index: 15;
      right: -5%;
      bottom: -4%;
      left: -5%;
      height: 12%;
      background: #11112b;
      clip-path: polygon(
        0 37%, 8% 31%, 17% 43%, 27% 28%,
        38% 42%, 48% 34%, 59% 45%, 70% 30%,
        80% 40%, 91% 26%, 100% 39%, 100% 100%, 0 100%
      );
    }

    .hint {
      position: fixed;
      z-index: 60;
      right: 1rem;
      bottom: 1rem;
      color: #998bbd;
      font-size: clamp(0.4rem, 0.8vw, 0.55rem);
      line-height: 1.8;
    }

    @keyframes darken-sky {
      to {
        filter: brightness(0.57) saturate(0.85) hue-rotate(10deg);
      }
    }

    @keyframes sunset {
      from {
        bottom: 25%;
      }
      to {
        bottom: 13%;
      }
    }

    @keyframes star-appear {
      0%, 22% { opacity: 0; }
      50% { opacity: 0.3; }
      75%, 100% { opacity: 1; }
    }

    @keyframes twinkle {
      0%, 45% { filter: brightness(0.65); }
      46%, 100% { filter: brightness(1.4); }
    }

    @keyframes cloud-drift {
      to {
        transform: translateX(calc(100vw + 28rem));
      }
    }

    @keyframes welcome-in {
      from {
        opacity: 0;
        transform: translate(-50%, -35%);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes shimmer {
      to {
        translate: 8px 0;
        opacity: 0.38;
      }
    }

    @keyframes wave {
      to {
        transform: translateX(4rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }

      .star {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <main class="world">
    <div class="stars" id="stars" aria-hidden="true"></div>
    <div class="sun" aria-hidden="true"></div>

    <div class="cloud one" aria-hidden="true"></div>
    <div class="cloud two" aria-hidden="true"></div>

    <section class="welcome">
      <h1>WELCOME</h1>
      <p>
        A NEW NIGHT IS BEGINNING<span class="blink"></span>
      </p>
    </section>

    <div class="mountains" aria-hidden="true"></div>

    <div class="ocean" aria-hidden="true">
      <div class="reflection"></div>
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>

    <div class="shore" aria-hidden="true"></div>
    <div class="hint">★ WATCH THE STARS APPEAR</div>
  </main>

  <script>
    const sky = document.getElementById("stars");
    const fragment = document.createDocumentFragment();

    // Seeded randomness keeps the star field consistent on every refresh.
    let seed = 1987;
    const random = () => {
      seed = (seed * 16807) % 2147483647;
      return (seed - 1) / 2147483646;
    };

    for (let i = 0; i < 95; i++) {
      const star = document.createElement("i");
      const size = random() > 0.82 ? 3 : 2;

      star.className = `star${random() > 0.72 ? "" : " small"}`;
      star.style.left = `${2 + random() * 96}%`;
      star.style.top = `${3 + random() * 78}%`;
      star.style.setProperty("--size", `${size}px`);
      star.style.setProperty("--delay", `${(random() * 10).toFixed(2)}s`);
      star.style.setProperty("--duration", `${2 + random() * 3}s`);

      fragment.appendChild(star);
    }

    sky.appendChild(fragment);
  </script>

</body></html>
